<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart Water ATM</title>
    <link rel="stylesheet" href="style.css" />
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
  </head>
  <body>
    <main class="container">
      <section class="card">
        <h1>Smart Water ATM</h1>
        <p class="price">₹5 = 1 Liter Water</p>

        <button id="payBtn" class="pay-btn">Pay ₹5</button>

        <p id="statusMessage" class="status" aria-live="polite"></p>
        <p class="hint">Water will be released only after secure payment verification.</p>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
